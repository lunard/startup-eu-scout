name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            script: build:linux
            artifact: linux
          - os: windows-latest
            script: build:win
            artifact: windows
          - os: macos-latest
            script: build:mac
            artifact: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.artifact }}
          path: |
            release/*.AppImage
            release/*.exe
            release/*.dmg
          if-no-files-found: warn
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -30 || true

      - name: Extract changelog delta
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # Extract section for this version from CHANGELOG.md
          BODY=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, ver)) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$BODY" ]; then
            BODY="Release $TAG"
          fi

          # Write to file (multi-line safe)
          echo "$BODY" > release_notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Delete existing release (if any)
        run: gh release delete "${{ github.ref_name }}" --yes --cleanup-tag=false 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "EU-Match ${{ github.ref_name }}" \
            --notes-file release_notes.md \
            artifacts/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove auto-attached source archives
        run: |
          TAG="${{ github.ref_name }}"
          for asset in $(gh release view "$TAG" --json assets -q '.assets[].name' | grep -E '\.(zip|tar\.gz)$'); do
            echo "Deleting $asset"
            gh release delete-asset "$TAG" "$asset" --yes
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
