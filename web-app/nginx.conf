server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ───────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"          always;
    add_header Referrer-Policy        "strict-origin"    always;
    # Allow WebGPU/WebNN SharedArrayBuffer (required by WebLLM)
    add_header Cross-Origin-Opener-Policy  "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # ── SPA fallback (React Router / client-side routing) ──────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ───────────────────────────────────────────
    location ~* \.(js|css|woff2?|png|ico|svg|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-add COOP/COEP here too (location overrides server block)
        add_header Cross-Origin-Opener-Policy  "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # ── Proxy: EU Funding & Tenders API ───────────────────────────────
    # Maps /api/eu/* → https://api.tech.ec.europa.eu/*
    # Avoids browser CORS issues; target never receives user credentials.
    location /api/eu/ {
        proxy_pass          ${PROXY_EU_API}/;
        proxy_http_version  1.1;
        proxy_ssl_server_name on;
        proxy_set_header    Connection     "";
        proxy_set_header    Host           $proxy_host;
        proxy_set_header    X-Real-IP      $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        # Strip the original Authorization header — EU API is public
        proxy_set_header    Authorization  "";
    }

    # ── Proxy: OpenCorporates API ──────────────────────────────────────
    # Maps /api/opencorporates/* → https://api.opencorporates.com/*
    location /api/opencorporates/ {
        proxy_pass          ${PROXY_OPENCORPORATES_API}/;
        proxy_http_version  1.1;
        proxy_ssl_server_name on;
        proxy_set_header    Connection     "";
        proxy_set_header    Host           $proxy_host;
        proxy_set_header    X-Real-IP      $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Authorization  "";
    }

    # ── Health check endpoint for ACA liveness probe ──────────────────
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
